name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for secret scanning history checks

      # 1. Credentials Scanning
      - name: Scan Secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false # Block merges if any secret is exposed

      # 2. Node Setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Server Build Checks
      - name: Install Backend Dependencies
        run: npm ci
        working-directory: ASLStudyTool/server

      - name: Build Backend
        run: npm run build
        working-directory: ASLStudyTool/server

      # 4. Client Build Checks
      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ASLStudyTool/client

      - name: Build Frontend
        run: npm run build
        working-directory: ASLStudyTool/client

      # 5. Python Setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install AI Service Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: ASLStudyTool/ai_service

      # 6. Python Test Executions
      - name: Run AI Service Tests
        run: |
          pip install pytest
          python -m pytest
        working-directory: ASLStudyTool/ai_service
